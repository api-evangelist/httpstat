naftiko: 1.0.0-alpha2
info:
  label: httpstat
  description: A simple service for generating various HTTP status codes. Use this API to test how your scripts handle different
    HTTP responses.
  tags:
  - Httpstat
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: httpstat
    baseUri: https://httpstat.us
    description: httpstat HTTP API.
    resources:
    - name: statuscode
      path: /{statusCode}
      operations:
      - name: get-statuscode
        method: GET
        description: Generate a specific HTTP status code
        inputParameters:
        - name: statusCode
          in: path
          type: string
          required: true
          description: The HTTP status code to generate.
        - name: sleep
          in: query
          type: integer
          description: Delay the response by the specified duration in milliseconds (max 230 seconds for hosted instance).
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: random-range
      path: /random/{range}
      operations:
      - name: get-random-range
        method: GET
        description: Generate a random HTTP status code
        inputParameters:
        - name: range
          in: path
          type: string
          required: true
          description: The range of HTTP status codes to randomize (e.g., `200,201,500-504`).
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: httpstat-rest
    description: REST adapter for httpstat.
    resources:
    - path: /{statusCode}
      name: get-statuscode
      operations:
      - method: GET
        name: get-statuscode
        description: Generate a specific HTTP status code
        call: httpstat.get-statuscode
        with:
          statusCode: rest.statusCode
        outputParameters:
        - type: object
          mapping: $.
    - path: /random/{range}
      name: get-random-range
      operations:
      - method: GET
        name: get-random-range
        description: Generate a random HTTP status code
        call: httpstat.get-random-range
        with:
          range: rest.range
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: httpstat-mcp
    transport: http
    description: MCP adapter for httpstat for AI agent use.
    tools:
    - name: get-statuscode
      description: Generate a specific HTTP status code
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: httpstat.get-statuscode
      with:
        statusCode: tools.statusCode
        sleep: tools.sleep
      inputParameters:
      - name: statusCode
        type: string
        description: The HTTP status code to generate.
        required: true
      - name: sleep
        type: integer
        description: Delay the response by the specified duration in milliseconds (max 230 seconds for hosted instance).
      outputParameters:
      - type: object
        mapping: $.
    - name: get-random-range
      description: Generate a random HTTP status code
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: httpstat.get-random-range
      with:
        range: tools.range
      inputParameters:
      - name: range
        type: string
        description: The range of HTTP status codes to randomize (e.g., `200,201,500-504`).
        required: true
      outputParameters:
      - type: object
        mapping: $.
