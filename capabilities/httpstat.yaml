naftiko: 1.0.0-alpha2
info:
  label: httpstat
  description: 'httpstat. 2 operations. Lead operation: Generate a random HTTP status code. Self-contained Naftiko capability
    covering one Httpstat business surface.'
  tags:
  - Httpstat
  - httpstat
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    HTTPSTAT_API_KEY: HTTPSTAT_API_KEY
capability:
  consumes:
  - type: http
    namespace: httpstat
    baseUri: https://httpstat.us
    description: httpstat business capability. Self-contained, no shared references.
    resources:
    - name: random-range
      path: /random/{range}
      operations:
      - name: get
        method: GET
        description: Generate a random HTTP status code
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: range
          in: path
          type: string
          description: The range of HTTP status codes to randomize (e.g., `200,201,500-504`).
          required: true
    - name: statusCode
      path: /{statusCode}
      operations:
      - name: get
        method: GET
        description: Generate a specific HTTP status code
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: statusCode
          in: path
          type: string
          description: The HTTP status code to generate.
          required: true
        - name: sleep
          in: query
          type: integer
          description: Delay the response by the specified duration in milliseconds (max 230 seconds for hosted instance).
  exposes:
  - type: rest
    namespace: httpstat-rest
    port: 8080
    description: REST adapter for httpstat. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/random/{range}
      name: random-range
      description: REST surface for random-range.
      operations:
      - method: GET
        name: get
        description: Generate a random HTTP status code
        call: httpstat.get
        with:
          range: rest.range
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/{statuscode}
      name: statuscode
      description: REST surface for statusCode.
      operations:
      - method: GET
        name: get
        description: Generate a specific HTTP status code
        call: httpstat.get
        with:
          statusCode: rest.statusCode
          sleep: rest.sleep
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: httpstat-mcp
    port: 9090
    transport: http
    description: MCP adapter for httpstat. One tool per consumed operation, routed inline through this capability's consumes
      block.
    tools:
    - name: generate-random-http-status-code
      description: Generate a random HTTP status code
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: httpstat.get
      with:
        range: tools.range
      outputParameters:
      - type: object
        mapping: $.
    - name: generate-specific-http-status-code
      description: Generate a specific HTTP status code
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: httpstat.get
      with:
        statusCode: tools.statusCode
        sleep: tools.sleep
      outputParameters:
      - type: object
        mapping: $.
